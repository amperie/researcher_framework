# Dataset registry for NeuralSignalResearcher.
#
# Each entry defines a logical dataset and its MongoDB source coordinates:
#   application_name     → MongoDB database name
#   sub_application_name → MongoDB collection name
#
# Entries are referenced by 'name' in feature proposals and config defaults.
# The feature_proposal LLM is shown this list so it can choose the right dataset
# and detector for each experiment.

datasets:
  - name: "HaluBench"
    description: "Hallucination detection benchmark — RAG, summarization, and QA tasks"
    application_name: "HaluBench"
    sub_application_name: "GranularAttentioAndWO"
    available_detectors:
      - "hallucination"
    default_query: {}

    # Fields guaranteed present in every scan from this dataset.
    # Feature set classes MUST only access guaranteed/optional fields.
    available_scan_fields:
      guaranteed:
        - "outputs"           # {batch_idx: {layer_id: Tensor}} — primary activation data
        - "inputs"            # {batch_idx: {layer_id: Tensor}}
        - "layer_id_to_name"  # {layer_id: str}
        - "layer_order"       # [layer_id, ...] in execution order
        - "layer_passes"      # {layer_id: int}
        - "zone_size"         # int — default token zone size
        - "ground_truth"      # int (0 or 1) — binary label
      optional:
        - "metadata"          # dict — present but NOT auto-populated; avoid
        - "zone_sizes_by_layer"
        - "layer_names_to_include"
        - "layer_indexes_to_include"
      not_available:
        - "patched_logit_diffs"
        - "attention_scores"
        - "probe_weights"
        - "concept_mean_activations"
        - "logit_lens_projections"

    # Substring patterns matching layer_id_to_name values for this dataset's model.
    # Injected into generated feature set configs at instantiation time.
    layer_name_patterns:
      ffn:  ["mlp", "feed_forward", ".wi", ".wo", ".act", ".w1", ".w2", ".w3", "ff.", "fc"]
      attn: [".q", ".k", ".v", ".o", "SelfAttention", "attention", "attn"]
