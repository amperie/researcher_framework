# Global runtime configuration for the research pipeline.
# Profile-specific settings (prompts, datasets, base classes, metrics, step list)
# belong in configs/profiles/<name>.yaml — not here.
#
# Secrets use ${ENV_VAR} or ${ENV_VAR:default} syntax.
# Values are resolved from environment variables or configs/.env (if present).

# ── LLM ───────────────────────────────────────────────────────────────────────
llm_provider: anthropic                        # anthropic | openai
llm_model: ~                                   # null = use profile default
anthropic_api_key: ${ANTHROPIC_API_KEY:}
openai_api_key: ${OPENAI_API_KEY:}

# ── MongoDB ───────────────────────────────────────────────────────────────────
mongo_url: ${MONGO_URL:mongodb://hp.lan:27017}
datasets_db_name: researcher_datasets

# ── ChromaDB ──────────────────────────────────────────────────────────────────
chroma_host: ${CHROMA_HOST:hp.lan}
chroma_port: ${CHROMA_PORT:8000}
chroma_ssl: false
chroma_auth_token: ${CHROMA_AUTH_TOKEN:}
chroma_collection: experiments

# ── MLflow ────────────────────────────────────────────────────────────────────
mlflow_uri: ${MLFLOW_URI:http://localhost:5000}

# ── Experiment execution ──────────────────────────────────────────────────────
experiment_timeout_seconds: 1800
validate_timeout_seconds: 120
experiments_dir: dev/experiments

# ── neuralsignal plugin ───────────────────────────────────────────────────────
neuralsignal_python: ${NEURALSIGNAL_PYTHON:uv run python}
neuralsignal_src_path: ${NEURALSIGNAL_SRC_PATH:../neuralsignal/neuralsignal}

# ── Arxiv ─────────────────────────────────────────────────────────────────────
max_arxiv_papers: 20

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level: DEBUG

  console:
    enabled: true
    level: INFO
    format: "%(asctime)s [%(levelname)-8s] %(name)s (%(filename)s:%(lineno)d): %(message)s"
    datefmt: "%H:%M:%S"

  file:
    enabled: true
    level: DEBUG
    path: "logs/research.log"
    max_bytes: 10485760   # 10 MB
    backup_count: 5
    format: "%(asctime)s [%(levelname)-8s] %(name)-40s (%(filename)s:%(lineno)d): %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
